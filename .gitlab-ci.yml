default:
  image: node:20-bookworm
  tags:
    - docker

stages:
  - verify
  - build
  - release

variables:
  PNPM_VERSION: "9.12.0"
  PNPM_STORE_DIR: "$CI_PROJECT_DIR/.pnpm-store"
  HUSKY: "0"
  # Skip the ~200MB Electron postinstall binary; vitest/typecheck don't need it,
  # and electron-builder fetches its own platform binary independently.
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

.pnpm:
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "${PNPM_STORE_DIR}"
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull
  interruptible: true

typecheck:
  stage: verify
  extends: .pnpm
  cache:
    policy: pull-push
  script:
    - pnpm --filter desktop typecheck

test:
  stage: verify
  extends: .pnpm
  script:
    - pnpm desktop:test

build:mac:
  stage: build
  tags:
    # Group-shared mac runner. The rayark Developer ID Application certificate
    # is pre-installed in its login keychain, so we no longer fetch a p12 via
    # CSC_LINK / CSC_KEY_PASSWORD — electron-builder picks the cert up via
    # CSC_IDENTITY_AUTO_DISCOVERY (set by start-dev.sh when LOUPE_SIGN_MAC=1).
    # Two darwin group runners carry this tag: sdk-engine-builder-sandbox (id
    # 1307) and sdk-framework-builder-sandbox (id 1308); GitLab will pick
    # whichever is idle first.
    - sdk-builder
  rules:
    - if: $CI_COMMIT_REF_NAME == "release"
    - if: $CI_COMMIT_TAG
  needs:
    - typecheck
    - test
  allow_failure: true
  variables:
    # Notarization still relies on protected CI variables APPLE_API_KEY /
    # APPLE_API_KEY_ID / APPLE_API_ISSUER (or the APPLE_ID + APPLE_APP_
    # SPECIFIC_PASSWORD + APPLE_TEAM_ID combo). Those are independent of the
    # signing certificate and aren't moved into the keychain.
    LOUPE_SIGN_MAC: "1"
  before_script:
    # Force electron-builder to use the keychain cert instead of any stale
    # CSC_LINK / CSC_KEY_PASSWORD that might still be set as a protected
    # variable from the previous p12-based setup.
    - unset CSC_LINK CSC_KEY_PASSWORD
    # Diagnostic: which mac host actually ran this job? gitlab-runner reports
    # its own binary arch (often amd64-under-Rosetta on Apple Silicon), so the
    # only honest way to tell is to ask the host directly. `arch` + `uname -m`
    # should agree on a true Intel Mac and differ when the runner binary is
    # amd64 but the host is arm64.
    - echo "[diag] host=$(uname -a)"; echo "[diag] arch=$(arch) uname-m=$(uname -m)"; sw_vers || true
    # The old loupe-mac runner pinned Python 3.13 to dodge a brew libexpat
    # bug in 3.14. Apply the same pin only if 3.13 is actually present on
    # this runner; otherwise fall back to whatever Python the runner ships.
    - |
      if [ -x /opt/homebrew/bin/python3.13 ]; then
        mkdir -p "$CI_PROJECT_DIR/.bin"
        ln -sf /opt/homebrew/bin/python3.13 "$CI_PROJECT_DIR/.bin/python"
        export PATH="$CI_PROJECT_DIR/.bin:$PATH"
      fi
    # Cover both Apple Silicon (/opt/homebrew) and Intel (/usr/local) brew prefixes.
    - export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.local/bin:$PATH"
    - command -v fnm >/dev/null 2>&1 && eval "$(fnm env)" || true
    # The sdk-builder runners may have an old node (without corepack) somewhere
    # on PATH already; checking `command -v node` returns success but corepack
    # is then missing. Drop our own pinned Node into the job workspace and put
    # it ahead of whatever the runner ships.
    - |
      NODE_VERSION=20.20.2
      NODE_ARCH=$(uname -m | sed 's/x86_64/x64/')
      if [ ! -x "$CI_PROJECT_DIR/.node/bin/node" ]; then
        echo "[setup] Installing Node ${NODE_VERSION} (${NODE_ARCH}) into \$CI_PROJECT_DIR/.node"
        mkdir -p "$CI_PROJECT_DIR/.node"
        curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-${NODE_ARCH}.tar.gz" \
          | tar -xz -C "$CI_PROJECT_DIR/.node" --strip-components=1
      fi
    - export PATH="$CI_PROJECT_DIR/.node/bin:$PATH"
    - echo "[diag] node=$(command -v node) ($(node -v)) corepack=$(command -v corepack)"
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
  script:
    # Tag-driven version bump + switch publish provider to GitLab generic
    # package (with deploy token in URL) before electron-builder runs.
    - node scripts/gitlab-ci-prepare-build.mjs
    - ./start-dev.sh build
    # Stable, arch-agnostic filename for the GitLab Release direct-download link.
    # electron-builder produces whichever arch the runner is — `cp *.dmg` matches
    # the single dmg in dist/ (we don't currently build universal). The release
    # page link below stays valid whether the runner is Intel (x64) or Apple
    # Silicon (arm64); auto-update consumers read the arch-suffixed filename out
    # of latest-mac.yml independently.
    - cp apps/desktop/dist/*.dmg apps/desktop/dist/loupe-macos.dmg
    # Upload latest-mac.yml + binaries to the Generic Package registry so
    # installed apps' Check-for-Updates can resolve via the generic URL.
    # Tag pipelines only (script no-ops on release-branch verifications).
    - bash scripts/gitlab-ci-publish-update.sh
  artifacts:
    name: "loupe-macos-$CI_COMMIT_SHORT_SHA"
    paths:
      - apps/desktop/dist/*.dmg
      - apps/desktop/dist/*.zip
      - apps/desktop/dist/*.yml
      - apps/desktop/dist/*.blockmap
    expire_in: 1 week
    when: always
  interruptible: false

build:win:
  stage: build
  image: electronuserland/builder:wine
  rules:
    - if: $CI_COMMIT_REF_NAME == "release"
    - if: $CI_COMMIT_TAG
  needs:
    - typecheck
    - test
  allow_failure: true
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "${PNPM_STORE_DIR}"
    # Root package.json declares pnpm.supportedArchitectures (darwin/linux/win32),
    # so this install on a Linux host fetches win32-x64 optionalDependencies too
    # (e.g. @ffmpeg-installer/win32-x64). Without that, the bundled NSIS would
    # ship a Linux ELF in place of ffmpeg.
    - pnpm install --frozen-lockfile
  script:
    - node scripts/gitlab-ci-prepare-build.mjs
    # Fetch the go-ios Windows binary. apps/desktop/vendor/go-ios/**/bin/ is
    # gitignored, so unlike scrcpy and uxplay (committed) the rayark checkout
    # has no ios.exe. Upstream GitHub uses prepare-vendor-binaries.ps1, which
    # we can't run from this Linux container; this helper does the same fetch
    # cross-platform.
    - node scripts/fetch-go-ios.mjs --platform win32-x64
    # package.json has `npmRebuild: false`, so electron-builder's `build` step
    # won't fetch Windows-ABI prebuilds for native modules. Do it ourselves so
    # better-sqlite3 ends up as a Windows PE / Electron-ABI .node instead of
    # the Linux ELF that pnpm's install hook fetched.
    - pnpm --dir apps/desktop exec electron-builder install-app-deps --platform=win32 --arch=x64
    - pnpm --dir apps/desktop dist:win
    # Stable filename for the GitLab Release direct-download link. Matches
    # `Loupe QA Recorder-X.Y.Z.exe` while excluding `__uninstaller-*.exe`.
    - cp apps/desktop/dist/[!_]*.exe apps/desktop/dist/loupe-windows-x64.exe
    - sh scripts/gitlab-ci-publish-update.sh
  artifacts:
    name: "loupe-windows-$CI_COMMIT_SHORT_SHA"
    paths:
      - apps/desktop/dist/*.exe
      - apps/desktop/dist/*.msi
      - apps/desktop/dist/*.zip
      - apps/desktop/dist/*.yml
      - apps/desktop/dist/*.blockmap
    expire_in: 1 week
    when: always
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull
  interruptible: false

rollback:update-channel:
  stage: release
  image: alpine:3.21
  rules:
    - if: $CI_COMMIT_REF_NAME == "release"
      when: manual
      allow_failure: true
  variables:
    # Operator passes ROLLBACK_VERSION via the manual-run dialog (Variables
    # section). Value example: "0.5.1" — no leading "v". The version must
    # already exist as loupe/<VERSION>/ in the package registry. GitLab
    # only allows `description:` on pipeline-level variables, not job-level,
    # so this hint lives in a YAML comment instead.
    ROLLBACK_VERSION: ""
  before_script:
    - apk add --no-cache curl python3 bash
  script:
    - sh scripts/gitlab-ci-rollback-update-channel.sh

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]/
  needs:
    - job: build:mac
      artifacts: false
      optional: true
    - job: build:win
      artifacts: false
      optional: true
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Loupe $CI_COMMIT_TAG"
    description: |
      Internal Rayark release built from tag $CI_COMMIT_TAG (sha $CI_COMMIT_SHORT_SHA).

      Download platform binaries from the linked job artifacts below.
      The macOS .dmg is signed with the Rayark Developer ID and notarized
      by Apple; it should open without Gatekeeper warnings. The Windows
      .exe is unsigned (matches upstream's GitHub Actions output).
    assets:
      links:
        - name: "macOS — DMG"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/apps/desktop/dist/loupe-macos.dmg?job=build:mac"
          link_type: package
        - name: "Windows (x64) — Installer"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/apps/desktop/dist/loupe-windows-x64.exe?job=build:win"
          link_type: package
