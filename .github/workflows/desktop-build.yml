name: Build desktop binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            platform: mac
            artifact: loupe-macos
          - name: Windows
            # Pinned: windows-latest moved to windows-2025 which ships VS 18
            # (2026). node-gyp 10.2 (the version pnpm 9.12 bundles) can't
            # identify VS 18 — its PowerShell-based finder hits
            # ERR_CHILD_PROCESS_STDIO_MAXBUFFER and then falls back to a
            # version table that knows only up to VS 2022. Result: better-sqlite3
            # rebuild aborts with "Could not find any Visual Studio installation".
            # Revisit when bumping node-gyp (>=11) or pnpm (>=10).
            os: windows-2022
            platform: win
            artifact: loupe-windows

    env:
      CI: true
      CSC_IDENTITY_AUTO_DISCOVERY: false
      LOUPE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.LOUPE_GOOGLE_OAUTH_CLIENT_ID }}
      LOUPE_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.LOUPE_GOOGLE_OAUTH_CLIENT_SECRET }}
      LOUPE_GITLAB_OAUTH_INSTANCES: ${{ secrets.LOUPE_GITLAB_OAUTH_INSTANCES }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Pin Python 3.11 for the better-sqlite3 source rebuild that
      # scripts/rebuild-electron.mjs forces. better-sqlite3 pulls in
      # node-gyp 9.4.1, whose vendored gyp does `from distutils.version
      # import StrictVersion` — distutils was removed in Python 3.12.
      # The hosted runners default to Python 3.12+, so without this pin
      # the rebuild aborts with `ModuleNotFoundError: No module named
      # 'distutils'`. Drop when bumping node-gyp >=10 via pnpm overrides
      # (10.x no longer touches distutils).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Google OAuth build inputs
        if: github.event_name != 'pull_request'
        run: |
          if [[ -z "${LOUPE_GOOGLE_OAUTH_CLIENT_ID}" || -z "${LOUPE_GOOGLE_OAUTH_CLIENT_SECRET}" ]]; then
            echo "::error::Set LOUPE_GOOGLE_OAUTH_CLIENT_ID and LOUPE_GOOGLE_OAUTH_CLIENT_SECRET in the repository or environment secrets. Google's loopback Desktop OAuth requires both even with PKCE."
            exit 1
          fi

      - name: Verify LOUPE_GITLAB_OAUTH_INSTANCES (lenient)
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${LOUPE_GITLAB_OAUTH_INSTANCES:-}" ]; then
            echo "::warning::LOUPE_GITLAB_OAUTH_INSTANCES is empty; built artifact will require users to enter their own GitLab OAuth client ID."
            exit 0
          fi
          echo "$LOUPE_GITLAB_OAUTH_INSTANCES" | python3 -c 'import json,sys; data=json.loads(sys.stdin.read()); assert isinstance(data, list), "must be a JSON array"; [(_:=__import__("sys").exit(f"invalid entry: {e}")) for e in data if not (isinstance(e, dict) and "url" in e and "clientId" in e)]; print(f"validated {len(data)} OAuth instance(s)")'

      - name: Type check
        run: pnpm --filter desktop typecheck

      - name: Test
        continue-on-error: true
        run: pnpm desktop:test

      - name: Set desktop version from tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag ${TAG_NAME} does not map to a valid package version."
            exit 1
          fi
          node -e "const fs=require('fs'); const path='apps/desktop/package.json'; const version=process.argv[1]; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version=version; fs.writeFileSync(path, JSON.stringify(pkg,null,2)+'\n');" "${version}"
          echo "Desktop package version set to ${version}."

      - name: Prepare Apple API key
        if: matrix.platform == 'mac' && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [[ -z "${APPLE_API_KEY_BASE64}" ]]; then
            exit 0
          fi
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "${APPLE_API_KEY_BASE64}" | base64 --decode > "${key_path}"
          chmod 600 "${key_path}"
          echo "APPLE_API_KEY=${key_path}" >> "${GITHUB_ENV}"

      - name: Verify Apple signing secrets
        if: matrix.platform == 'mac' && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [[ -z "${CSC_LINK}" || -z "${CSC_KEY_PASSWORD}" ]]; then
            echo "::error::Set CSC_LINK and CSC_KEY_PASSWORD secrets for the Developer ID Application certificate."
            exit 1
          fi
          if [[ -n "${APPLE_API_KEY_BASE64}" || -n "${APPLE_API_KEY_ID}" || -n "${APPLE_API_ISSUER}" ]]; then
            if [[ -z "${APPLE_API_KEY_BASE64}" || -z "${APPLE_API_KEY_ID}" || -z "${APPLE_API_ISSUER}" ]]; then
              echo "::error::Set APPLE_API_KEY_BASE64, APPLE_API_KEY_ID, and APPLE_API_ISSUER together."
              exit 1
            fi
            exit 0
          fi
          if [[ -z "${APPLE_ID}" || -z "${APPLE_APP_SPECIFIC_PASSWORD}" || -z "${APPLE_TEAM_ID}" ]]; then
            echo "::error::Set Apple notarization secrets: either APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID, or APPLE_API_KEY_BASE64 + APPLE_API_KEY_ID + APPLE_API_ISSUER."
            exit 1
          fi

      - name: Package macOS binary
        if: matrix.platform == 'mac'
        env:
          LOUPE_SIGN_MAC: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && '1' || '0' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: ./start-dev.sh build

      - name: Verify macOS signing and notarization
        if: matrix.platform == 'mac' && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
        run: |
          app_path="$(find apps/desktop/dist -type d -name '*.app' -print -quit)"
          dmg_path="$(find apps/desktop/dist -type f -name '*.dmg' -print -quit)"

          if [[ -z "${app_path}" ]]; then
            echo "::error::Could not find a packaged .app under apps/desktop/dist."
            exit 1
          fi
          if [[ -z "${dmg_path}" ]]; then
            echo "::error::Could not find a packaged .dmg under apps/desktop/dist."
            exit 1
          fi

          ls -la "${app_path}/Contents/_CodeSignature" || true
          codesign --display --verbose=4 "${app_path}"
          codesign --verify --verbose=4 "${app_path}"
          xcrun stapler validate "${app_path}"
          spctl --assess --type execute --verbose=4 "${app_path}"
          hdiutil verify "${dmg_path}"

      - name: Package Windows binary
        if: matrix.platform == 'win'
        shell: powershell
        run: .\start-dev.bat build

      - name: Upload macOS installer
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.yml
            apps/desktop/dist/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows installer
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.msi
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.yml
            apps/desktop/dist/*.blockmap
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v7
        with:
          pattern: loupe-*
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Loupe ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.pkg
            release-assets/**/*.zip
            release-assets/**/*.yml
            release-assets/**/*.blockmap
