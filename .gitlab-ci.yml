default:
  image: node:20-bookworm
  tags:
    - docker

stages:
  - verify

variables:
  PNPM_VERSION: "9.12.0"
  PNPM_STORE_DIR: "$CI_PROJECT_DIR/.pnpm-store"
  HUSKY: "0"

.pnpm:
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "${PNPM_STORE_DIR}"
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull
  interruptible: true

typecheck:
  stage: verify
  extends: .pnpm
  cache:
    policy: pull-push
  script:
    - pnpm --filter desktop typecheck

test:
  stage: verify
  extends: .pnpm
  allow_failure: true
  script:
    - pnpm desktop:test
