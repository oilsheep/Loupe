default:
  image: node:20-bookworm
  tags:
    - docker

stages:
  - verify
  - build
  - release

variables:
  PNPM_VERSION: "9.12.0"
  PNPM_STORE_DIR: "$CI_PROJECT_DIR/.pnpm-store"
  HUSKY: "0"
  # Skip the ~200MB Electron postinstall binary; vitest/typecheck don't need it,
  # and electron-builder fetches its own platform binary independently.
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

.pnpm:
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "${PNPM_STORE_DIR}"
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull
  interruptible: true

typecheck:
  stage: verify
  extends: .pnpm
  cache:
    policy: pull-push
  script:
    - pnpm --filter desktop typecheck

test:
  stage: verify
  extends: .pnpm
  script:
    - pnpm desktop:test

build:mac:
  stage: build
  tags:
    - loupe-mac
  rules:
    - if: $CI_COMMIT_REF_NAME == "release"
    - if: $CI_COMMIT_TAG
  needs:
    - typecheck
    - test
  allow_failure: true
  variables:
    # Enable signing + notarization. CSC_LINK / CSC_KEY_PASSWORD / APPLE_API_KEY
    # / APPLE_API_KEY_ID / APPLE_API_ISSUER / APPLE_TEAM_ID are protected CI
    # variables, only injected on protected refs (release branch, v* tags).
    LOUPE_SIGN_MAC: "1"
    # Pin node-gyp to a working Python; the host's /opt/homebrew Python 3.14
    # has a broken libexpat link that crashes during better-sqlite3 rebuild.
    PYTHON: "/opt/homebrew/bin/python3.13"
  before_script:
    # Provide unversioned `python` for electron-builder DMG step (it calls
    # `which python` directly, ignoring the PYTHON env). Homebrew ships only python3.
    - mkdir -p "$CI_PROJECT_DIR/.bin"
    - ln -sf "$PYTHON" "$CI_PROJECT_DIR/.bin/python"
    - export PATH="$CI_PROJECT_DIR/.bin:/opt/homebrew/bin:$HOME/.local/bin:$PATH"
    - eval "$(fnm env)"
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
  script:
    - ./start-dev.sh build
  artifacts:
    name: "loupe-macos-$CI_COMMIT_SHORT_SHA"
    paths:
      - apps/desktop/dist/*.dmg
      - apps/desktop/dist/*.zip
      - apps/desktop/dist/*.yml
      - apps/desktop/dist/*.blockmap
    expire_in: 1 week
    when: always
  interruptible: false

build:win:
  stage: build
  image: electronuserland/builder:wine
  rules:
    - if: $CI_COMMIT_REF_NAME == "release"
    - if: $CI_COMMIT_TAG
  needs:
    - typecheck
    - test
  allow_failure: true
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "${PNPM_STORE_DIR}"
    - pnpm install --frozen-lockfile
  script:
    - pnpm --dir apps/desktop dist:win
  artifacts:
    name: "loupe-windows-$CI_COMMIT_SHORT_SHA"
    paths:
      - apps/desktop/dist/*.exe
      - apps/desktop/dist/*.msi
      - apps/desktop/dist/*.zip
      - apps/desktop/dist/*.yml
      - apps/desktop/dist/*.blockmap
    expire_in: 1 week
    when: always
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull
  interruptible: false

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]/
  needs:
    - job: build:mac
      artifacts: false
      optional: true
    - job: build:win
      artifacts: false
      optional: true
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Loupe $CI_COMMIT_TAG"
    description: |
      Internal Rayark release built from tag $CI_COMMIT_TAG (sha $CI_COMMIT_SHORT_SHA).

      Download platform binaries from the linked job artifacts below.
      The macOS .dmg is signed with the Rayark Developer ID and notarized
      by Apple; it should open without Gatekeeper warnings. The Windows
      .exe is unsigned (matches upstream's GitHub Actions output).
    assets:
      links:
        - name: "macOS (arm64) — DMG + zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build:mac"
          link_type: package
        - name: "Windows (x64) — installer + zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build:win"
          link_type: package
